services:
  echo:
    image: python:3.12-slim
    command: ["python3", "/app/echo-server.py"]
    volumes:
      - ./tests/e2e/echo-server.py:/app/echo-server.py:ro
    networks:
      e2e:
        ipv4_address: 172.28.0.10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["-c", "/config/masque-e2e.toml", "-vv"]
    cap_add:
      - NET_ADMIN
    volumes:
      - ./certs:/certs:ro
      - ./tests/e2e/masque-e2e.toml:/config/masque-e2e.toml:ro
    depends_on:
      - echo
    networks:
      e2e:
        ipv4_address: 172.28.0.20

  test:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    environment:
      MASQUE_SERVER_ADDR: "172.28.0.20:4433"
      ECHO_SERVER_ADDR: "172.28.0.10:9999"
      RUST_LOG: "masque_e2e=debug"
    depends_on:
      - server
      - echo
    networks:
      e2e:

networks:
  e2e:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
